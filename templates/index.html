<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Audicore — Stream and discover music. Upload your tracks, explore trending songs, and build playlists.">
  <title>Audicore — Music Streaming</title>

  <!-- DNS prefetch & preconnect for CDN speed -->
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://code.jquery.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">

  <!-- Preload critical scripts so browser fetches them in parallel -->
  <link rel="preload" href="https://unpkg.com/react@18/umd/react.production.min.js" as="script" crossorigin>
  <link rel="preload" href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" as="script" crossorigin>
  <link rel="preload" href="https://code.jquery.com/jquery-3.7.1.min.js" as="script" crossorigin>

  <!-- Fonts -->
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,700&f[]=satoshi@400,500&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="/static/css/styles.css?v=1781603041.61957">

  <!-- ============================================================
       LOADER STYLES — inline, renders before any CDN loads
  ============================================================ -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Root overlay ── */
    #audicore-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #000505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.9s cubic-bezier(0.4,0,0.2,1), visibility 0.9s;
    }
    #audicore-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    /* ── Ambient glow blobs ── */
    .amb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      animation: amb-pulse 6s ease-in-out infinite alternate;
    }
    .amb-1 {
      width: 50vw; height: 50vw;
      top: -15%; left: -10%;
      background: radial-gradient(circle, rgba(0,120,100,0.25) 0%, transparent 70%);
      animation-delay: 0s;
    }
    .amb-2 {
      width: 40vw; height: 40vw;
      bottom: -10%; right: -5%;
      background: radial-gradient(circle, rgba(0,50,180,0.2) 0%, transparent 70%);
      animation-delay: -3s;
    }
    .amb-3 {
      width: 20vw; height: 20vw;
      top: 30%; left: 60%;
      background: radial-gradient(circle, rgba(0,200,180,0.1) 0%, transparent 70%);
      animation-delay: -1.5s;
    }
    @keyframes amb-pulse {
      from { transform: scale(1) translate(0,0); }
      to   { transform: scale(1.2) translate(2%,2%); }
    }

    /* ── Stage ── */
    .ld-stage {
      position: relative;
      width: 220px;
      height: 220px;
    }

    /* ── SVG progress arc ── */
    .ld-svg {
      position: absolute;
      inset: 0;
      width: 220px;
      height: 220px;
      transform: rotate(-90deg);
    }
    .ld-svg .track {
      fill: none;
      stroke: rgba(0,255,255,0.06);
      stroke-width: 3;
    }
    .ld-svg .progress-arc {
      fill: none;
      stroke: url(#pg);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 628;    /* 2π × 100 */
      stroke-dashoffset: 628;
      transition: stroke-dashoffset 0.4s ease;
      filter: drop-shadow(0 0 8px rgba(0,255,255,0.8));
    }

    /* ── Outer slow ring (ccw) ── */
    .ring-outer {
      position: absolute;
      inset: -15px; /* 220 + 30 = 250 */
      border-radius: 50%;
      border: 1px dashed rgba(0,255,255,0.12);
      animation: spin-ccw 18s linear infinite;
    }
    /* Dots on outer ring */
    .ring-outer::before, .ring-outer::after {
      content: '';
      position: absolute;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(0,255,255,0.5);
      box-shadow: 0 0 8px rgba(0,255,255,0.7);
    }
    .ring-outer::before { top: -2.5px; left: 50%; transform: translateX(-50%); }
    .ring-outer::after  { bottom: -2.5px; left: 50%; transform: translateX(-50%); }

    /* ── Fast spinning arc rings ── */
    .ring-fast-1 {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top: 2px solid rgba(0,255,255,0.9);
      border-right: 2px solid rgba(0,200,255,0.4);
      animation: spin-cw 1.6s linear infinite;
      box-shadow: inset 0 0 0 0 transparent;
      filter: drop-shadow(0 0 5px rgba(0,255,255,0.5));
    }
    .ring-fast-2 {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-bottom: 1.5px solid rgba(0,100,255,0.8);
      border-left: 1.5px solid rgba(0,100,255,0.3);
      animation: spin-ccw 2.3s linear infinite;
      filter: drop-shadow(0 0 4px rgba(0,100,255,0.4));
    }

    /* ── Glow core ── */
    .ld-glow {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,255,0.12) 0%, rgba(0,80,80,0.05) 50%, transparent 70%);
      animation: glow-breathe 2.8s ease-in-out infinite;
    }
    @keyframes glow-breathe {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%       { transform: scale(1.4); opacity: 0.3; }
    }

    /* ── Logo ── */
    .ld-logo {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logo-levitate 4s ease-in-out infinite;
    }
    .ld-logo img {
      width: 82px;
      height: 82px;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(0,255,255,0.5)) drop-shadow(0 0 32px rgba(0,200,255,0.2));
    }
    @keyframes logo-levitate {
      0%, 100% { transform: translateY(0)   scale(1);    filter: drop-shadow(0 0 20px rgba(0,255,255,0.4)); }
      40%       { transform: translateY(-7px) scale(1.04); filter: drop-shadow(0 0 30px rgba(0,255,255,0.7)); }
      70%       { transform: translateY(-3px) scale(1.01); }
    }

    /* ── Keyframes ── */
    @keyframes spin-cw  { to { transform: rotate(360deg);  } }
    @keyframes spin-ccw { to { transform: rotate(-360deg); } }

    /* ── App name ── */
    .ld-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(90deg, rgba(0,255,255,0.4), #ffffff, rgba(0,220,255,0.8), #ffffff, rgba(0,255,255,0.4));
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: text-shimmer 3s linear infinite;
    }
    @keyframes text-shimmer {
      from { background-position: 0%   center; }
      to   { background-position: 300% center; }
    }

    /* ── Equalizer bars ── */
    .ld-eq {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 28px;
    }
    .ld-eq .b {
      width: 3px;
      border-radius: 3px;
      background: linear-gradient(to top, #00ffff, #0066ff);
      box-shadow: 0 0 5px rgba(0,200,255,0.4);
    }
    .ld-eq .b:nth-child(1)  { animation: eq 0.9s 0.00s ease-in-out infinite alternate; }
    .ld-eq .b:nth-child(2)  { animation: eq 0.9s 0.07s ease-in-out infinite alternate; }
    .ld-eq .b:nth-child(3)  { animation: eq 0.9s 0.14s ease-in-out infinite alternate; }
    .ld-eq .b:nth-child(4)  { animation: eq 0.9s 0.21s ease-in-out infinite alternate; }
    .ld-eq .b:nth-child(5)  { animation: eq 0.9s 0.28s ease-in-out infinite alternate; }
    .ld-eq .b:nth-child(6)  { animation: eq 0.9s 0.35s ease-in-out infinite alternate; }
    .ld-eq .b:nth-child(7)  { animation: eq 0.9s 0.28s ease-in-out infinite alternate; }
    .ld-eq .b:nth-child(8)  { animation: eq 0.9s 0.21s ease-in-out infinite alternate; }
    .ld-eq .b:nth-child(9)  { animation: eq 0.9s 0.14s ease-in-out infinite alternate; }
    .ld-eq .b:nth-child(10) { animation: eq 0.9s 0.07s ease-in-out infinite alternate; }
    .ld-eq .b:nth-child(11) { animation: eq 0.9s 0.00s ease-in-out infinite alternate; }
    @keyframes eq {
      from { height: 4px;  opacity: 0.35; }
      to   { height: 26px; opacity: 1;    }
    }

    /* ── Status row ── */
    .ld-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(0,255,255,0.45);
    }
    .ld-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #00ffff;
      animation: dot-blink 1.2s ease-in-out infinite;
      box-shadow: 0 0 6px #00ffff;
    }
    @keyframes dot-blink {
      0%, 100% { opacity: 1; transform: scale(1);   }
      50%       { opacity: 0.2; transform: scale(0.6); }
    }
    .ld-pct {
      font-size: 12px;
      font-weight: 600;
      color: rgba(0,255,255,0.6);
      letter-spacing: 1px;
    }

    /* ── Floating particles ── */
    .ld-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .pt {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,255,255,0.7);
    }

    /* ── Scan-line overlay for depth ── */
    #audicore-loader::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       LOADING SCREEN — instant, before CDN scripts load
  ============================================================ -->
  <div id="audicore-loader">
    <!-- Ambient blobs -->
    <div class="amb amb-1"></div>
    <div class="amb amb-2"></div>
    <div class="amb amb-3"></div>

    <!-- Floating particles -->
    <div class="ld-particles" id="ld-particles"></div>

    <!-- Central stage -->
    <div class="ld-stage">
      <!-- SVG progress arc -->
      <svg class="ld-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#00ffff"/>
            <stop offset="50%"  stop-color="#00aaff"/>
            <stop offset="100%" stop-color="#0033ff"/>
          </linearGradient>
        </defs>
        <circle class="track"        cx="110" cy="110" r="100"/>
        <circle class="progress-arc" cx="110" cy="110" r="100" id="ld-arc"/>
      </svg>

      <!-- Slow outer dashed ring with dots -->
      <div class="ring-outer"></div>

      <!-- Fast spinning arc rings -->
      <div class="ring-fast-1"></div>
      <div class="ring-fast-2"></div>

      <!-- Glow orb -->
      <div class="ld-glow"></div>

      <!-- Logo -->
      <div class="ld-logo">
        <img src="/static/assets/audicore-logo.webp" alt="Audicore">
      </div>
    </div>

    <!-- Name -->
    <div class="ld-name">Audicore</div>

    <!-- Equalizer -->
    <div class="ld-eq">
      <div class="b"></div><div class="b"></div><div class="b"></div>
      <div class="b"></div><div class="b"></div><div class="b"></div>
      <div class="b"></div><div class="b"></div><div class="b"></div>
      <div class="b"></div><div class="b"></div>
    </div>

    <!-- Status -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="ld-status">
        <div class="ld-dot"></div>
        <span id="ld-label">Waking up servers...</span>
      </div>
      <div class="ld-pct" id="ld-pct">0%</div>
    </div>
  </div>

  <!-- ============================================================
       LOADER CONTROLLER
  ============================================================ -->
  <script>
    (function () {
      var loader  = document.getElementById('audicore-loader');
      var arc     = document.getElementById('ld-arc');
      var label   = document.getElementById('ld-label');
      var pct     = document.getElementById('ld-pct');
      var pts     = document.getElementById('ld-particles');
      var CIRC    = 2 * Math.PI * 100; // 628.3

      // ── Session guard: show loader only ONCE per session ──
      if (sessionStorage.getItem('ac_loaded')) {
        // Already seen this session — hide immediately, skip all animations
        loader.style.display = 'none';
        window.loaderDone         = function () {};
        window.loaderSetProgress  = function () {};
        return;
      }
      sessionStorage.setItem('ac_loaded', '1');

      // ── Spawn particles ──
      for (var i = 0; i < 30; i++) {
        (function () {
          var p     = document.createElement('div');
          p.className = 'pt';
          var s     = (Math.random() * 2.5 + 0.5).toFixed(1);
          var dur   = (Math.random() * 12 + 7).toFixed(1);
          var delay = (Math.random() * -15).toFixed(1);
          var x     = (Math.random() * 100).toFixed(1);
          p.style.cssText = [
            'width:' + s + 'px',
            'height:' + s + 'px',
            'left:' + x + '%',
            'bottom:-12px',
            'opacity:0',
            'animation:pt-rise ' + dur + 's ' + delay + 's linear infinite'
          ].join(';');
          pts.appendChild(p);
        })();
      }
      var ptKf = document.createElement('style');
      ptKf.textContent = '@keyframes pt-rise{0%{transform:translateY(0) translateX(0);opacity:0}8%{opacity:.7}92%{opacity:.3}100%{transform:translateY(-105vh) translateX(40px);opacity:0}}';
      document.head.appendChild(ptKf);

      // ── Progress ──
      var current = 0;
      var rampTimer = null;
      function setProgress(val, msg) {
        val = Math.min(100, Math.max(current, +val));
        current = val;
        if (arc) arc.style.strokeDashoffset = (CIRC * (1 - val / 100)).toFixed(2);
        if (pct)   pct.textContent  = Math.round(val) + '%';
        if (msg && label) label.textContent = msg;
      }

      // ── Phases ──
      setProgress(8, 'Waking up servers...');

      window.addEventListener('load', function () {
        setProgress(55, 'Loading app...');
      });

      // Smooth ramp to 82% while waiting for React
      var rampV = 8;
      function ramp() {
        rampV += 0.6;
        if (rampV < 83) {
          var msg = rampV < 25 ? 'Waking up servers...'
                  : rampV < 50 ? 'Loading scripts...'
                  : rampV < 70 ? 'Almost ready...'
                  :              'Connecting...';
          setProgress(rampV, msg);
          rampTimer = setTimeout(ramp, 200);
        }
      }
      setTimeout(ramp, 400);

      // ── Public API for React ──
      window.loaderSetProgress = function (val, msg) {
        clearTimeout(rampTimer);
        setProgress(val, msg);
      };

      var loaderStart = Date.now();
      window.loaderDone = function () {
        clearTimeout(rampTimer);
        setProgress(100, 'Ready!');
        // Minimum 2-second display so it never flashes
        var wait = Math.max(700, 2000 - (Date.now() - loaderStart));
        setTimeout(function () {
          loader.classList.add('hidden');
          setTimeout(function () {
            if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
          }, 1000);
        }, wait);
      };

      // ── Keep-alive ping every 14 min ──
      setInterval(function () {
        fetch('/api/v1/songs/trending').catch(function () {});
      }, 14 * 60 * 1000);
    })();
  </script>

  <!-- App root -->
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App -->
  <script src="/static/js/app.js?v=1781603041.61957"></script>
</body>
</html>
